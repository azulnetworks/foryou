<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zugang gesperrt</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0a0e1a;
      color: #edf2f7;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 420px;
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .lock-box {
      width: 68px;
      height: 68px;
      background: #111827;
      border: 1px solid #252f45;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .lock-box svg {
      width: 32px;
      height: 32px;
      stroke: #6c5ce7;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(24px, 7vw, 32px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      color: #8892a8;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: #edf2f7;
      border: 1px solid #252f45;
      border-radius: 12px;
      padding: 14px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-back:hover {
      border-color: #3a4560;
      background: #111827;
    }

    .btn-back svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="lock-box">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
    </div>
    <h1>Mindestalter: 21+</h1>
    <p>Dieses Angebot ist leider erst ab 21 Jahren verfügbar.</p>
    <a href="age-gate.html" class="btn-back" id="btn-back">
      <svg viewBox="0 0 24 24">
        <line x1="19" y1="12" x2="5" y2="12" />
        <polyline points="12 19 5 12 12 5" />
      </svg>
      Zurück
    </a>
  </div>
  <script>
    (function () {
      var qs = window.location.search;
      if (qs) { document.getElementById('btn-back').href = 'age-gate.html' + qs; }
    })();
  </script>
</body>

</html>
